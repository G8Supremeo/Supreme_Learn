<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="seafoamGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <!-- Deep Slate App Container -->
  <rect width="100" height="100" rx="24" fill="#020617" />

  <!-- The Geometric Fluid Infinity Loop (Scaled and centered) -->
  <g transform="translate(10, -5) scale(0.8)">
    <!-- Rotated diagonally for modern tech momentum -->
    <g transform="rotate(-30 50 50)">
      <!-- Top-Left Fluid Sweeping Ribbon (Skyblue dominant) -->
      <path d="M 50 50 C -10 -20, 10 120, 50 50" 
            fill="url(#skyGrad)" 
            opacity="0.9" 
            style="mix-blend-mode: screen;" />
            
      <!-- Bottom-Right Fluid Sweeping Ribbon (Seafoam dominant) -->
      <path d="M 50 50 C 110 120, 90 -20, 50 50" 
            fill="url(#seafoamGrad)" 
            opacity="0.9" 
            style="mix-blend-mode: screen;" />
            
      <!-- Central Core Anchor -->
      <circle cx="50" cy="50" r="6" fill="#ffffff" opacity="0.95" />
    </g>
  </g>

  <!-- Base Brand Text -->
  <text x="50" y="86" 
        font-family="Outfit, system-ui, sans-serif" 
        font-weight="700" 
        font-size="14" 
        fill="#f8fafc" 
        text-anchor="middle" 
        letter-spacing="0.5">
    Supremify
  </text>
</svg>