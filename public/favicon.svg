<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d6d" />
      <stop offset="100%" stop-color="#ff7ea5" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2b2d42" />
      <stop offset="100%" stop-color="#4a4e69" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <style>
    @keyframes spin1 { 100% { transform: rotate(360deg); } }
    @keyframes spin2 { 100% { transform: rotate(-360deg); } }
    .ring-1 { transform-origin: 50px 20px; animation: spin1 5s linear infinite; }
    .ring-2 { transform-origin: 50px 20px; animation: spin2 9s linear infinite; }
  </style>

  <!-- Left Page / Shield -->
  <path d="M 50 85 L 15 70 L 15 30 L 50 45 Z" fill="url(#grad2)" />
  <!-- Right Page / Shield -->
  <path d="M 50 85 L 85 70 L 85 30 L 50 45 Z" fill="url(#grad1)" />
  <!-- Center spine -->
  <line x1="50" y1="45" x2="50" y2="85" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Floating AI node / knowledge orb (Spinning Sun) -->
  <circle cx="50" cy="20" r="9" fill="#ff4d6d" filter="url(#glow)"/>
  <circle class="ring-1" cx="50" cy="20" r="16" fill="none" stroke="#2b2d42" stroke-width="2" stroke-dasharray="4 4"/>
  <circle class="ring-2" cx="50" cy="20" r="23" fill="none" stroke="#ff7ea5" stroke-width="1.5" stroke-dasharray="1 6"/>
</svg>