<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="outerGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  <style>
    .spin {
      transform-origin: 50px 50px;
      animation: spin-right 8s linear infinite;
    }
    .spin-reverse {
      transform-origin: 50px 50px;
      animation: spin-left 12s linear infinite;
    }
    @keyframes spin-right { 100% { transform: rotate(360deg); } }
    @keyframes spin-left { 100% { transform: rotate(-360deg); } }
  </style>

  <!-- Glowing Core Node -->
  <circle cx="50" cy="50" r="16" fill="url(#coreGrad)" />
  
  <!-- Fast Clockwise Inner Orbit -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#outerGrad)" stroke-width="4" stroke-dasharray="14 10" class="spin"/>
  
  <!-- Slow Counter-Clockwise Outer Orbit -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#coreGrad)" stroke-width="2" stroke-dasharray="30 15 10 15" class="spin-reverse" opacity="0.8"/>
  
</svg>